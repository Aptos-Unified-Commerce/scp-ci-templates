name: Docker Build & Push to ECR (with Self-Healing)

on:
  workflow_call:
    inputs:
      aws-region:
        description: "AWS region for ECR"
        required: false
        type: string
        default: "us-east-1"
      ecr-repository:
        description: "ECR repository name"
        required: true
        type: string
      dockerfile-path:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      docker-context:
        description: "Docker build context directory"
        required: false
        type: string
        default: "."
      image-tag:
        description: "Additional image tag (besides git SHA and latest)"
        required: false
        type: string
        default: ""
      python-version:
        description: "Python version for pre-build testing"
        required: false
        type: string
        default: "3.11"
      run-tests:
        description: "Whether to run uv tests before Docker build"
        required: false
        type: boolean
        default: true
      enable-healing:
        description: "Enable self-healing on failures"
        required: false
        type: boolean
        default: true
      enable-analysis:
        description: "Enable build history tracking"
        required: false
        type: boolean
        default: true
    secrets:
      AWS_ROLE_ARN:
        description: "IAM role ARN with ECR permissions"
        required: true
      ANTHROPIC_API_KEY:
        description: "Optional: Claude API key for AI-powered analysis"
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    if: inputs.run-tests

    steps:
      - uses: actions/checkout@v4

      - name: Checkout CI templates
        uses: actions/checkout@v4
        with:
          repository: Aptos-Unified-Commerce/scp-ci-templates
          path: .ci-templates

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Install CI Agent
        run: pip install .ci-templates/agent

      - name: Install dependencies
        run: uv sync --all-extras

      # ---- Primary test run ----
      - name: Run tests
        id: test
        continue-on-error: true
        run: |
          uv run pytest 2>&1 | tee /tmp/build.log

      # ---- Self-healing for tests ----
      - name: Diagnose test failure
        id: heal
        if: inputs.enable-healing && steps.test.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ci-agent heal --log-file /tmp/build.log --attempt 1

      - name: Apply healing
        if: steps.heal.outcome == 'success' && steps.heal.outputs.should-retry == 'true'
        run: |
          COMMANDS='${{ steps.heal.outputs.retry-commands }}'
          if [ -n "$COMMANDS" ]; then
            echo "$COMMANDS" | while IFS= read -r cmd; do
              [ -n "$cmd" ] && eval "$cmd"
            done
          fi

      - name: Retry tests
        id: retry
        if: steps.heal.outcome == 'success' && steps.heal.outputs.should-retry == 'true'
        run: |
          uv sync --all-extras
          uv run pytest

      - name: Fail if tests failed
        if: always()
        run: |
          if [ "${{ steps.test.outcome }}" = "success" ] || [ "${{ steps.retry.outcome }}" = "success" ]; then
            echo "Tests passed"
          else
            echo "::error::Tests failed after healing attempts"
            exit 1
          fi

  docker-build-push:
    needs: test
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Checkout CI templates
        uses: actions/checkout@v4
        with:
          repository: Aptos-Unified-Commerce/scp-ci-templates
          path: .ci-templates

      - name: Install CI Agent
        run: pip install .ci-templates/agent

      - name: Restore build history
        if: inputs.enable-analysis
        uses: actions/cache@v4
        with:
          path: build_history.json
          key: build-history-${{ github.repository }}-${{ github.ref_name }}
          restore-keys: |
            build-history-${{ github.repository }}-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata
        id: meta
        run: |
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          REPO=${{ inputs.ecr-repository }}
          SHA_SHORT=$(git rev-parse --short HEAD)
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')

          TAGS="${REGISTRY}/${REPO}:${SHA_SHORT}"
          TAGS="${TAGS},${REGISTRY}/${REPO}:${BRANCH}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${REGISTRY}/${REPO}:latest"
          fi

          if [ -n "${{ inputs.image-tag }}" ]; then
            TAGS="${TAGS},${REGISTRY}/${REPO}:${{ inputs.image-tag }}"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "primary-image=${REGISTRY}/${REPO}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Primary Docker build ----
      - name: Build and push Docker image
        id: docker-build
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Self-healing for Docker build ----
      - name: Diagnose Docker failure
        id: heal-docker
        if: inputs.enable-healing && steps.docker-build.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Docker build failed" > /tmp/docker-build.log
          ci-agent heal --log-file /tmp/docker-build.log --attempt 1

      - name: Retry Docker build (no cache)
        id: retry-docker
        if: steps.heal-docker.outcome == 'success' && steps.heal-docker.outputs.should-retry == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          no-cache: true

      # ---- Record and report ----
      - name: Determine status
        id: status
        if: always()
        run: |
          if [ "${{ steps.docker-build.outcome }}" = "success" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.retry-docker.outcome }}" = "success" ]; then
            echo "status=healed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Record build result
        if: always() && inputs.enable-analysis
        run: |
          ci-agent record \
            --build-type docker \
            --status "${{ steps.status.outputs.status }}" \
            --failure-class "${{ steps.heal-docker.outputs.failure-class || '' }}" \
            --healing-strategy "${{ steps.heal-docker.outputs.strategy || '' }}"

      - name: Save build history
        if: always() && inputs.enable-analysis
        uses: actions/cache/save@v4
        with:
          path: build_history.json
          key: build-history-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Summary
        if: always()
        run: |
          STATUS="${{ steps.status.outputs.status }}"
          echo "### Docker Build — ${STATUS}" >> $GITHUB_STEP_SUMMARY
          if [ "$STATUS" != "failure" ]; then
            echo "- **Image:** ${{ steps.meta.outputs.primary-image }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if not healed
        if: always()
        run: |
          if [ "${{ steps.status.outputs.status }}" = "failure" ]; then
            exit 1
          fi
